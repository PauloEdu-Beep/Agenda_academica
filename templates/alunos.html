{% extends 'layout.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Alunos</h2>
        <a href="{{ url_for('add_aluno') }}" class="btn btn-primary">Adicionar Aluno</a>
    </div>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome Completo</th>
                <th>Email</th>
                <th>Matrícula</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for aluno in alunos %}
            <tr>
                <td>{{ aluno.usuario_id }}</td>
                <td>{{ aluno.nome_completo }}</td>
                <td>{{ aluno.email }}</td>
                <td>{{ aluno.matricula }}</td>
                <td>
                    <a href="{{ url_for('edit_aluno', id=aluno.usuario_id) }}" class="btn btn-sm btn-warning">Editar</a>
                    <form action="{{ url_for('delete_aluno', id=aluno.usuario_id) }}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza?');">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
